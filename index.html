<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puzzle Bahasa Lampung</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        /* =========================================
           CSS VARIABLES & GLOBAL RESET
           ========================================= */
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --bg-sky: #E1F5FE;
            --danger: #F44336;
            --warning: #FFC107;
            --shadow-color: rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #333;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }

        /* =========================================
           MENUS (MAIN MENU & IMAGE SELECTION)
           ========================================= */
        .fullscreen-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--bg-sky), #B3E5FC);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .fullscreen-menu.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        .title-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .game-title {
            font-family: 'Fredoka One', 'Segoe UI', cursive, sans-serif;
            font-size: 3rem;
            color: var(--primary-dark);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .game-logo {
            max-width: 90vw;
            max-height: 200px;
            margin-bottom: 15px;
            filter: drop-shadow(0px 6px 10px rgba(0,0,0,0.2));
        }

        .game-subtitle {
            font-size: 1.2rem;
            color: #555;
            background: rgba(255,255,255,0.7);
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* --- CREATOR & SOCIAL MEDIA --- */
        .creator-info {
            margin-top: 10px;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .creator-text {
            font-weight: bold;
            color: #555;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        .social-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .social-icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
        .social-icon.ig:hover { background-color: #fce7f3; color: #db2777; border-color: #fce7f3; }
        .social-icon.tt:hover { background-color: #dbeafe; color: #3b82f6; border-color: #dbeafe; }
        .social-icon.fb:hover { background-color: #e0e7ff; color: #4f46e5; border-color: #e0e7ff; }
        .social-icon.yt:hover { background-color: #fee2e2; color: #dc2626; border-color: #fee2e2; }

        /* --- NEW MAIN MENU LAYOUT --- */
        .main-menu-layout {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            gap: 50px;
        }

        .main-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        .main-right {
            flex: 1.2;
            display: flex;
            justify-content: center;
        }

        .game-logo-large {
            width: 100%;
            max-width: 600px; /* Ukuran Logo jauh lebih besar */
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }

        .mode-buttons-col {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @media (max-width: 768px) {
            .main-menu-layout {
                flex-direction: column-reverse; /* Di HP: Logo di atas, Tombol di bawah */
                gap: 30px;
            }
            .game-logo-large {
                max-width: 350px;
            }
        }
        /* ---------------------------- */

        .mode-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--primary-dark);
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:active { transform: translateY(5px); box-shadow: 0 0 0 var(--primary-dark); }
        .btn-mode-solo { background-color: #4CAF50; box-shadow: 0 5px 0 #388E3C; }
        .btn-mode-duel { background-color: #FF9800; box-shadow: 0 5px 0 #F57C00; }
        .btn-mode-squad { background-color: #9C27B0; box-shadow: 0 5px 0 #7B1FA2; }
        .btn-secondary { background-color: #757575; box-shadow: 0 5px 0 #424242; margin-top: 20px;}

        /* Image Selection Grid */
        .image-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .img-option {
            width: 400px;
            max-width: 90vw;
            aspect-ratio: 2 / 1;
            border: 4px solid white;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        .img-option:hover { transform: scale(1.05); border-color: var(--primary); }
        .img-option-title {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.6);
            color: white;
            text-align: center;
            font-size: 1.2rem;
            padding: 8px 0;
            font-weight: bold;
        }

        /* Global Controls (Top Right) */
        #global-controls {
            position: absolute; top: 10px; right: 10px; z-index: 101;
            display: flex; gap: 10px;
        }

        .icon-btn {
            background: rgba(255,255,255,0.8); border: none; border-radius: 50%;
            width: 45px; height: 45px; font-size: 1.5rem; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
        }

        /* =========================================
           GAME CONTAINER & GRID (RESPONSIVE)
           ========================================= */
        #game-container {
            width: 100%; height: 100%; display: none;
            background: #222; gap: 4px; padding: 4px;
        }

        #game-container.mode-solo { display: block; }
        #game-container.mode-duel { display: grid; grid-template-columns: 1fr 1fr; }
        #game-container.mode-squad { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: 1fr; }

        @media (max-aspect-ratio: 3/4) {
            #game-container.mode-duel { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            #game-container.mode-squad { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
            #game-container.mode-squad .answers-grid { grid-template-columns: 1fr 1fr; }
        }

        /* =========================================
           PLAYER BOARD & PUZZLE UI
           ========================================= */
        .player-board {
            position: relative;
            background: white;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            overflow: hidden; border-radius: 8px;
        }

        /* Puzzle Container */
        .puzzle-area {
            flex: 1;
            background: radial-gradient(circle, #ece9e6, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            position: relative;
        }

        /* Papan Puzzle (Bayangan) */
        .puzzle-board {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 2 / 1; /* Sesuai rasio gambar 800x400 */
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 1fr);
            border: 3px solid #757575;
            background: #e0e0e0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        /* Kepingan Bayangan */
        .puzzle-piece {
            position: relative;
            border: 1px dashed rgba(0,0,0,0.15);
            background: rgba(0,0,0,0.05); /* Warna bayangan */
        }

        /* Gambar Asli Kepingan */
        .piece-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: 500% 200%; /* Karena 5 kolom 2 baris */
            background-repeat: no-repeat;
            opacity: 0; /* Sembunyikan awalnya */
            transform: scale(0.5);
            transition: opacity 0.5s, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .puzzle-piece.revealed .piece-img {
            opacity: 1;
            transform: scale(1); /* Efek pop-in menempati tempatnya */
        }

        /* Area Pertanyaan & Kontrol */
        .controls-area {
            background: white;
            padding: 10px;
            display: flex; flex-direction: column; gap: 10px;
            border-top: 3px solid #eee;
            z-index: 10;
        }

        .question-display {
            text-align: center;
            font-size: 2rem; font-weight: bold; color: #333;
            background: #f9f9f9; padding: 10px;
            border-radius: 8px; border: 2px dashed #ccc;
        }

        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .ans-btn {
            background: #f0f0f0; border: 2px solid #ddd;
            padding: 15px; font-size: 1.2rem; font-weight: bold;
            border-radius: 8px; cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .ans-btn:active { transform: scale(0.95); }
        .ans-btn.correct { background: var(--primary); color: white; border-color: var(--primary-dark); }
        .ans-btn.wrong { background: var(--danger); color: white; border-color: darkred; }

        /* Progress Bar (sebagai ganti timer) */
        .progress-bar-container { height: 8px; width: 100%; background: #ddd; }
        .progress-bar { height: 100%; width: 0%; background: var(--primary); transition: width 0.3s ease; }

        /* Player Header (Bawah) */
        .player-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px; background: white; border-top: 2px solid #eee; z-index: 10;
        }

        .player-name { font-weight: bold; color: var(--primary-dark); }
        .score-box { font-weight: bold; font-size: 1.1rem; color: #333; }
        
        /* Win Overlay */
        .win-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }

        .win-screen.show { opacity: 1; pointer-events: all; }
        .win-screen h2 { font-size: 2.5rem; color: var(--primary-dark); margin-bottom: 10px; text-align: center; }
        .win-screen .full-image-preview {
            width: 80%; max-width: 400px; aspect-ratio: 2/1;
            background-size: cover; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        /* Responsive Tweaks */
        #game-container.mode-squad .player-header { padding: 4px; flex-direction: column; justify-content: center; gap: 2px; }
        #game-container.mode-squad .player-name { font-size: 0.9rem; }
        #game-container.mode-squad .score-box { font-size: 0.8rem; }
        #game-container.mode-squad .question-display { font-size: 1rem; padding: 5px; }
        #game-container.mode-squad .answers-grid { grid-template-columns: 1fr; gap: 4px; }
        #game-container.mode-squad .ans-btn { font-size: 0.8rem; padding: 8px 4px; }
        
        @media (max-width: 600px) {
            .game-title { font-size: 2rem; }
            .ans-btn { padding: 8px; font-size: 1rem; }
            .question-display { font-size: 1.2rem; }
        }

    </style>
</head>

    <!-- MAIN MENU: Pilih Gambar -->
    <div id="image-menu" class="fullscreen-menu hidden">

            <h1 class="game-title" style="font-size: 2.8rem; margin-bottom: 0;">Pilih Gambar Puzzle</h1>

    <script>
        /**
         * =========================================
         * GENERATOR GAMBAR (Data URIs)
         * =========================================
         */
        const PuzzleImages = [
            { id: 1, name: "Nuwo Sesat", src: `url('https://i.imgur.com/yhyB2Iv.png')` },

        ];

        /**
         * =========================================
         * BANK SOAL BAHASA LAMPUNG
         * =========================================
         */
        const QuestionBank = [
            { q: 'Apa arti "Api"?', a: 'Api', c: ['Air', 'Api', 'Tanah', 'Angin'] },
            { q: 'Apa arti "Way"?', a: 'Air', c: ['Api', 'Air', 'Batu', 'Daun'] },

            { q: 'Apa arti "Gunung"?', a: 'Gunung', c: ['Laut', 'Bukit', 'Gunung', 'Sungai'] },
            { q: 'Apa arti "Labung / Teghai"?', a: 'Hujan', c: ['Panas', 'Air', 'Hujan', 'Awan'] },
            { q: 'Apa arti "Awan"?', a: 'Awan', c: ['Langit', 'Awan', 'Angin', 'Hujan'] },

        const LanguageGen = {
            generate() {
                const randomIndex = Math.floor(Math.random() * QuestionBank.length);
                const selectedItem = QuestionBank[randomIndex];
                const shuffledChoices = [...selectedItem.c].sort(() => Math.random() - 0.5);
                return { question: selectedItem.q, answer: selectedItem.a, choices: shuffledChoices };
            }
        };

        /**
         * =========================================
         * AUDIO SYNTHESIZER & BGM
         * =========================================
         */
        const AudioSys = {
            ctx: null, muted: false,
            bgm: new Audio('http://googleusercontent.com/file_content/1'),
            bgmStarted: false,
            init() {
                if (!this.ctx) { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
                if (this.ctx.state === 'suspended') this.ctx.resume();
                
                // Memulai BGM saat interaksi pertama
                if (!this.bgmStarted) {
                    this.bgm.loop = true;
                    this.bgm.volume = 0.3; // Mengatur volume agar tidak terlalu keras
                    this.bgm.play().catch(e => console.log("Audio autoplay prevented", e));
                    this.bgmStarted = true;
                }
            },
            toggleMute() {
                this.muted = !this.muted;
                this.bgm.muted = this.muted;
                return this.muted;
            },
            playTone(freq, type, duration, vol=0.1) {
                if (this.muted || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            },
            sfxPieceSnap() { 
                this.playTone(600, 'sine', 0.1, 0.1); 
                setTimeout(() => this.playTone(800, 'sine', 0.15, 0.1), 50);
            },
            sfxWrong() { this.playTone(150, 'sawtooth', 0.3, 0.2); },
            sfxWin() {
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    setTimeout(() => this.playTone(freq, 'triangle', 0.3, 0.1), i * 150);
                });
            }
        };

        /**
         * =========================================
         * KELAS PEMAIN (PUZZLE LOGIC)
         * =========================================
         */
        class Player {
            constructor(id, name, container, colorTheme, selectedPuzzleImg) {
                this.id = id;
                this.name = name;
                this.correctCount = 0;
                this.totalPieces = 10;
                this.isGameOver = false;
                this.puzzleImageSrc = selectedPuzzleImg;

                // Setup DOM
                const template = document.getElementById('player-template');
                const clone = template.content.cloneNode(true);
                this.board = clone.querySelector('.player-board');
                
                this.board.style.border = `4px solid ${colorTheme}`;
                this.board.querySelector('.player-name').style.color = colorTheme;
                this.board.querySelector('.player-name').innerText = name;
                container.appendChild(this.board);

                // Referensi Elemen
                this.elScore = this.board.querySelector('.score-box');
                this.elQuestion = this.board.querySelector('.question-display');
                this.elBtns = Array.from(this.board.querySelectorAll('.ans-btn'));
                this.elPuzzleBoard = this.board.querySelector('.puzzle-board');
                this.elProgressBar = this.board.querySelector('.progress-bar');
                this.elWinScreen = this.board.querySelector('.win-screen');

                // Events
                this.elBtns.forEach(btn => {
                    btn.addEventListener('mousedown', (e) => this.handleAnswer(e.target));
                    btn.addEventListener('touchstart', (e) => { e.preventDefault(); this.handleAnswer(e.target); }, {passive: false});
                });
                this.board.querySelector('.btn-retry').addEventListener('click', () => {
                    this.resetGame();
                });

                this.initPuzzlePieces();
                this.startRound();
            }

            initPuzzlePieces() {
                this.elPuzzleBoard.innerHTML = '';
                // Setup kepingan grid (5 kolom x 2 baris = 10 keping)
                for (let i = 0; i < this.totalPieces; i++) {
                    const col = i % 5;
                    const row = Math.floor(i / 5);
                    
                    const piece = document.createElement('div');
                    piece.className = 'puzzle-piece';
                    
                    const imgLayer = document.createElement('div');
                    imgLayer.className = 'piece-img';
                    imgLayer.style.backgroundImage = this.puzzleImageSrc;
                    
                    // Kalkulasi posisi background berdasarkan grid
                    const posX = (col / 4) * 100; // 0, 25, 50, 75, 100%
                    const posY = (row / 1) * 100; // 0, 100%
                    imgLayer.style.backgroundPosition = `${posX}% ${posY}%`;
                    
                    piece.appendChild(imgLayer);
                    this.elPuzzleBoard.appendChild(piece);
                }
            }

            startRound() {
                if (this.isGameOver) return;
                
                this.elBtns.forEach(b => {
                    b.className = 'ans-btn';
                    b.disabled = false;
                });

                this.currentQuestion = LanguageGen.generate();
                this.elQuestion.innerText = this.currentQuestion.question;
                
                this.elBtns.forEach((btn, idx) => {
                    btn.innerText = this.currentQuestion.choices[idx];
                });
            }

            handleAnswer(btn) {
                if (this.isGameOver || btn.disabled) return;
                this.elBtns.forEach(b => b.disabled = true);
                
                const selectedAns = btn.innerText;
                if (selectedAns === this.currentQuestion.answer) {
                    btn.classList.add('correct');
                    this.triggerCorrect();
                } else {
                    btn.classList.add('wrong');
                    this.elBtns.forEach(b => {
                        if(b.innerText === this.currentQuestion.answer) b.classList.add('correct');
                    });
                    this.triggerWrong();
                }
            }

            triggerCorrect() {
                AudioSys.sfxPieceSnap();
                
                // Buka 1 keping puzzle
                const pieces = this.elPuzzleBoard.querySelectorAll('.puzzle-piece');
                if (this.correctCount < this.totalPieces) {
                    pieces[this.correctCount].classList.add('revealed');
                    this.correctCount++;
                }

                // Update UI
                this.elScore.innerText = `Puzzle: ${this.correctCount}/${this.totalPieces}`;
                this.elProgressBar.style.width = `${(this.correctCount / this.totalPieces) * 100}%`;

                if (this.correctCount >= this.totalPieces) {
                    setTimeout(() => this.triggerWin(), 600);
                } else {
                    setTimeout(() => this.startRound(), 800);
                }
            }

            triggerWrong() {
                AudioSys.sfxWrong();
                // Jika salah, tetap tunjukkan jawaban benar sebentar, lalu lanjut soal baru (tidak dapat puzzle)
                setTimeout(() => this.startRound(), 1500);
            }

            triggerWin() {
                this.isGameOver = true;
                AudioSys.sfxWin();
                
                const imgPreview = this.elWinScreen.querySelector('.full-image-preview');
                imgPreview.style.backgroundImage = this.puzzleImageSrc;
                this.elWinScreen.classList.add('show');
            }

            resetGame() {
                this.isGameOver = false;
                this.correctCount = 0;
                this.elScore.innerText = `Puzzle: 0/${this.totalPieces}`;
                this.elProgressBar.style.width = `0%`;
                this.elWinScreen.classList.remove('show');
                
                // Tutup semua puzzle
                const pieces = this.elPuzzleBoard.querySelectorAll('.puzzle-piece');
                pieces.forEach(p => p.classList.remove('revealed'));

                this.startRound();
            }

            destroy() {
                this.board.remove();
            }
        }

        /**
         * =========================================
         * APP CONTROLLER (Global Logic)
         * =========================================
         */
        let players = [];
        let pendingMode = '';
        let chosenImageSrc = '';

        const elMainMenu = document.getElementById('main-menu');
        const elImageMenu = document.getElementById('image-menu');
        const elGameContainer = document.getElementById('game-container');
        const btnHome = document.getElementById('btn-home');
        const btnAudio = document.getElementById('btn-audio');
        const btnFullscreen = document.getElementById('btn-fullscreen');

        const COLORS = ['#4CAF50', '#FF9800', '#9C27B0', '#E91E63'];

        // Init Image Menu Grid
        const gridContainer = document.getElementById('image-grid-container');
        PuzzleImages.forEach(img => {
            const div = document.createElement('div');
            div.className = 'img-option';
            div.style.backgroundImage = img.src;
            div.onclick = () => startGameWithImage(img.src);
            
            const title = document.createElement('div');
            title.className = 'img-option-title';
            title.innerText = img.name;
            
            div.appendChild(title);
            gridContainer.appendChild(div);
        });

        function selectMode(mode) {
            AudioSys.init();
            pendingMode = mode;
            elMainMenu.classList.add('hidden');
            elImageMenu.classList.remove('hidden');
        }

        function backToMainMenu() {
            elImageMenu.classList.add('hidden');
            elMainMenu.classList.remove('hidden');
        }

        function startGameWithImage(imgSrc) {
            chosenImageSrc = imgSrc;
            elImageMenu.classList.add('hidden');
            
            elGameContainer.style.display = 'grid'; // atau block
            elGameContainer.className = `mode-${pendingMode}`;
            btnHome.style.display = 'block';

            players.forEach(p => p.destroy());
            players = [];
            elGameContainer.innerHTML = '';

            let playerCount = pendingMode === 'solo' ? 1 : pendingMode === 'duel' ? 2 : 4;
            
            for (let i = 0; i < playerCount; i++) {
                let name = playerCount === 1 ? 'Pemain' : `Player ${i+1}`;
                players.push(new Player(i, name, elGameContainer, COLORS[i], chosenImageSrc));
            }
        }

        function returnToMenu() {
            players.forEach(p => p.destroy());
            players = [];
            elGameContainer.style.display = 'none';
            elMainMenu.classList.remove('hidden');
            btnHome.style.display = 'none';
        }

        // --- Event Listeners UI Global ---
        btnHome.addEventListener('click', returnToMenu);

        btnAudio.addEventListener('click', () => {
            const isMuted = AudioSys.toggleMute();
            btnAudio.innerText = isMuted ? '🔇' : '🔊';
            btnAudio.style.opacity = isMuted ? '0.5' : '1';
        });

        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

    </script>
